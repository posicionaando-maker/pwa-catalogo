<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4F46E5">
    <meta name="description" content="Catálogo de productos PWA - Filtros avanzados">
    
    <!-- Título de la app -->
    <title>Mi Catálogo PWA</title>
    
    <!-- Link al manifest (necesario para PWA) -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Iconos para diferentes dispositivos -->
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <!-- CSS principal -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Soporte para navegadores antiguos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header de la aplicación -->
    <header class="app-header">
        <div class="header-content">
            <i class="fas fa-store"></i>
            <h1>Mi Catálogo</h1>
            <!-- Indicador de instalación PWA -->
            <button id="installButton" class="install-btn" style="display: none;">
                <i class="fas fa-download"></i> Instalar
            </button>
        </div>
    </header>

    <!-- Barra de búsqueda -->
    <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Buscar productos..." class="search-input">
        <button id="clearSearch" class="clear-search" style="display: none;">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <!-- Filtros avanzados -->
    <div class="filters-container">
        <div class="filter-group">
            <label><i class="fas fa-tag"></i> Categoría</label>
            <select id="categoryFilter">
                <option value="">Todas</option>
            </select>
        </div>

        <div class="filter-group">
            <label><i class="fas fa-truck"></i> Proveedor</label>
            <select id="supplierFilter">
                <option value="">Todos</option>
            </select>
        </div>

        <div class="filter-group">
            <label><i class="fas fa-star"></i> Calificación</label>
            <select id="ratingFilter">
                <option value="">Todas</option>
                <option value="4">4+ estrellas</option>
                <option value="3">3+ estrellas</option>
                <option value="2">2+ estrellas</option>
            </select>
        </div>

        <div class="filter-group price-range">
            <label><i class="fas fa-dollar-sign"></i> Precio máximo</label>
            <input type="range" id="priceRange" min="0" max="1000" step="10" value="1000">
            <span id="priceValue">$1000</span>
        </div>

        <button id="resetFilters" class="reset-btn">
            <i class="fas fa-undo"></i> Resetear filtros
        </button>
    </div>

    <!-- Contador de resultados -->
    <div class="results-count" id="resultsCount">
        Mostrando X productos
    </div>

    <!-- Grid de productos -->
    <div id="productsGrid" class="products-grid">
        <!-- Los productos se cargarán dinámicamente aquí -->
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i> Cargando productos...
        </div>
    </div>

    <!-- Footer con estado offline -->
    <footer class="app-footer">
        <div class="status" id="onlineStatus">
            <i class="fas fa-wifi"></i> En línea
        </div>
        <div class="version">PWA v1.0</div>
    </footer>

    <!-- Scripts -->
    <script src="js/app.js"></script>
</body>
</html>
